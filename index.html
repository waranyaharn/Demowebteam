<!DOCTYPE html>
<html>
<head>
    <title>FoodEase</title>
</head>
<body>

<h1>🍔 FoodEase</h1>

<form action="/add" method="POST">
    <input type="text" name="name" placeholder="Food name"><br>
    <input type="text" name="category" placeholder="Category"><br>
    <input type="number" name="price" placeholder="Price"><br>
    <input type="number" name="stock" placeholder="Stock"><br>
    <button type="submit">Add Menu</button>
</form>

<hr>

{% for food in foods %}
<div>
    <h3>{{ food.name }}</h3>
    <p>{{ food.category }}</p>
    <p>{{ food.price }} บาท</p>
    <p>เหลือ {{ food.stock }}</p>
</div>
{% endfor %}

</body>
</html>
